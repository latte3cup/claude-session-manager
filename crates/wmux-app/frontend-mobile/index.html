<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Claude SM Remote</title>
  <link rel="stylesheet" href="/vendor/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="auth-screen">
    <div class="auth-box">
      <h2>Claude SM Remote</h2>
      <p>PIN 입력</p>
      <input type="number" id="pin-input" maxlength="6" pattern="[0-9]*" inputmode="numeric" placeholder="000000">
      <button id="pin-submit">연결</button>
      <p id="auth-error" class="error"></p>
    </div>
  </div>

  <div id="app" style="display:none">
    <div id="header">
      <span id="session-title">Session</span>
      <span id="connection-status">connected</span>
    </div>
    <div id="terminal-area"></div>
    <div id="special-keys">
      <button data-key="\x03">Ctrl+C</button>
      <button data-key="\t">Tab</button>
      <button data-key="\x1b[A">Up</button>
      <button data-key="\x1b[B">Down</button>
      <button data-key="\x1b">Esc</button>
      <button data-key="\x0c">Clear</button>
    </div>
    <div id="tab-bar"></div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
