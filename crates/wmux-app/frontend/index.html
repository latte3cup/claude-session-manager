<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Session Manager</title>
  <link rel="stylesheet" href="vendor/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Hover trigger -->
  <div id="header-trigger"></div>

  <!-- App Header (hidden, shows on hover) -->
  <div id="app-header" data-tauri-drag-region>
    <span id="app-title">Claude Session Manager</span>
    <div id="header-actions">
      <button id="btn-settings" title="Settings">&#9881;</button>
      <span class="header-sep"></span>
      <button id="btn-minimize" title="Minimize">&#x2500;</button>
      <button id="btn-maximize" title="Maximize">&#9633;</button>
      <button id="btn-close" title="Close" class="close-btn">&#10005;</button>
    </div>
  </div>

  <!-- Terminal Pane Area -->
  <div id="pane-area"></div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <span>Settings</span>
        <button id="settings-close">X</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label>Layout</label>
          <div id="layout-options" class="option-row"></div>
        </div>
        <div class="setting-group">
          <label>Font</label>
          <div id="font-options" class="option-col"></div>
        </div>
        <div id="settings-save-area" class="save-area"></div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
