<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wmux</title>
  <link rel="stylesheet" href="vendor/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Tab Bar -->
  <div id="tab-bar">
    <button id="sidebar-toggle" title="Toggle sidebar">&#9776;</button>
    <div id="tabs"></div>
    <button id="new-tab" title="New workspace">+</button>
  </div>

  <div id="main-area">
    <!-- Sidebar -->
    <div id="sidebar">
      <div id="workspace-list"></div>
      <button id="sidebar-new-ws" title="New workspace">+ New Workspace</button>
    </div>

    <!-- Terminal Pane Area -->
    <div id="pane-area"></div>
  </div>

  <!-- Command Palette -->
  <div id="command-palette">
    <input type="text" id="cp-input" placeholder="Type a command or search..." autocomplete="off">
    <div id="cp-results"></div>
  </div>

  <!-- Status Bar -->
  <div id="status-bar">
    <span class="status-chip">Shell: <span id="status-shell" class="status-value"></span></span>
    <span class="status-chip">WS: <span id="status-workspace" class="status-value"></span></span>
    <span class="status-chip">Pane: <span id="status-pane" class="status-value"></span></span>
    <span class="status-chip">CPU: <span id="status-cpu" class="status-value">0%</span></span>
    <span class="status-chip">MEM: <span id="status-mem" class="status-value">0MB</span></span>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
