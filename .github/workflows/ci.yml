name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lints
        run: cargo clippy -p wmux-core -p wmux-cli --all-targets -- -D warnings

      - name: Run tests
        run: cargo test -p wmux-core -p wmux-cli
