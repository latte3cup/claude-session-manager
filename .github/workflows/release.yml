name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
      distribution:
        description: "Release package target"
        required: true
        default: "all"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            artifact_name: windows-x64
            build_command: .\build-release.ps1
            target_prefix: -Target
          - runner: macos-14
            artifact_name: macos-arm64
            build_command: chmod +x build-release.sh && ./build-release.sh
            target_prefix: "--target "

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Build release package
        env:
          BUILD_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          BUILD_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.distribution || 'all' }}
        run: ${{ matrix.build_command }} ${{ matrix.target_prefix }}${{ env.BUILD_TARGET }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-artifacts/*
          fail_on_unmatched_files: true
