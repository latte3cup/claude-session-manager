name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $conf = Get-Content crates/wmux-app/tauri.conf.json | ConvertFrom-Json
          $conf.version = $version
          $conf | ConvertTo-Json -Depth 10 | Set-Content crates/wmux-app/tauri.conf.json
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/wmux-app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build MCP server
        run: npm ci && npm run build
        working-directory: mcp

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri app
        run: cargo tauri build
        working-directory: crates/wmux-app

      - name: List build artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Recurse target/release/bundle -Filter *.exe
          Get-ChildItem -Recurse target/release/bundle -Filter *.msi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
