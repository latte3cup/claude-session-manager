<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #141820; color: #8899aa; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, sans-serif; }
  .loader { text-align: center; }
  .spinner { width: 32px; height: 32px; border: 3px solid #2a3040; border-top-color: #5588cc; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loader">
  <div class="spinner"></div>
  <div>Starting backend...</div>
</div>
</body>
</html>
